<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Xenzia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0e0e14;
      color: #c4c2d4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(140,138,165,0.12);
    }

    .brand {
      font-size: 16px;
      font-weight: 500;
      color: #e2e0f0;
      letter-spacing: 0.2px;
    }
    .brand span { color: #7F77DD; }

    #meta { display: flex; align-items: center; gap: 12px; }

    .pill {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(140,138,165,0.08);
      border: 1px solid rgba(140,138,165,0.15);
      color: #a09eb8;
    }

    #score-pill {
      background: rgba(127,119,221,0.12);
      border-color: rgba(127,119,221,0.25);
      color: #AFA9EC;
    }

    #sdot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7F77DD;
      display: inline-block;
      margin-right: 5px;
      transition: background 0.3s;
    }
    #sdot.dead { background: #888780; }

    #canvas-wrap { position: relative; flex: 1; }

    canvas { display: block; width: 100%; height: 100%; }

    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10,10,18,0.65);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    #overlay.show { display: flex; }
    #overlay h2 { color: rgba(255,255,255,0.82); font-size: 20px; font-weight: 500; }
    #overlay p  { color: rgba(255,255,255,0.38); font-size: 13px; }

    #restart-btn {
      margin-top: 4px;
      font-size: 13px;
      padding: 8px 22px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.75);
      cursor: pointer;
    }
    #restart-btn:hover { background: rgba(255,255,255,0.12); }

    #footer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      border-top: 1px solid rgba(140,138,165,0.12);
    }

    .key-hint {
      font-size: 12px;
      color: #6e6c82;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .kbd {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(140,138,165,0.08);
      border: 1px solid rgba(140,138,165,0.15);
      color: #a09eb8;
      font-family: monospace;
    }

    .sep {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(140,138,165,0.2);
    }
  </style>
</head>
<body>

  <div id="hud">
    <div class="brand">Snake <span>Xenzia</span></div>
    <div id="meta">
      <div class="pill" id="score-pill">Score: <span id="score-val">0</span></div>
      <div class="pill"><span id="sdot"></span><span id="status-val">playing</span></div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="overlay">
      <h2>Game over</h2>
      <p id="final-score">Score: 0</p>
      <button id="restart-btn">Play again</button>
    </div>
  </div>

  <div id="footer">
    <div class="key-hint"><span class="kbd">↑ ↓ ← →</span> controls</div>
    <div class="sep"></div>
    <div class="key-hint">3D Graphics game</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
